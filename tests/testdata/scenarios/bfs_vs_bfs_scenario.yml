lang_file: ../langs/org.mal-lang.coreLang-1.0.0.mar
model_file: ../models/basic_model.yml

agents:
  'attacker1':
    agent_class: BreadthFirstAttacker
    type: attacker
    reward_mode: ONE_OFF
    config:
      seed: 1
      action_ordering: random
    entry_points:
      - 'Program 1:fullAccess'

  'defender1':
    agent_class: BreadthFirstAttacker
    type: defender
    config:
      seed: 1
      action_ordering: random
    rewards:
      by_asset_name:
        Program 1:
          notPresent: 2
          supplyChainAuditing: 7
        Program 2:
          notPresent: 3
          supplyChainAuditing: 7
      
